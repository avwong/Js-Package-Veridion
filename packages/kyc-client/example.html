<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@oppia/kyc-client Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 8px;
            transition: background-color 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.unknown { background: #e9ecef; color: #495057; }
        .status.pending { background: #fff3cd; color: #856404; }
        .status.verified { background: #d4edda; color: #155724; }
        .status.rejected { background: #f8d7da; color: #721c24; }
        .log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }
        .config {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 6px;
            margin: 20px 0;
        }
        .config input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .config label {
            display: block;
            margin: 10px 0 5px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>@oppia/kyc-client Demo</h1>
    
    <div class="config">
        <h3>Configuration</h3>
        <label for="edgeUrl">Edge URL:</label>
        <input type="text" id="edgeUrl" value="http://localhost:4000" placeholder="https://edge.example.com">
        
        <label for="clientId">Client ID:</label>
        <input type="text" id="clientId" value="demo-app" placeholder="your-app-id">
        
        <button onclick="initializeKyc()">Initialize KYC Client</button>
    </div>

    <div class="container">
        <h3>KYC Actions</h3>
        
        <div id="status" class="status unknown">Status: Not initialized</div>
        
        <button onclick="startKycPopup()" id="popupBtn" disabled>Start KYC (Popup)</button>
        <button onclick="startKycIframe()" id="iframeBtn" disabled>Start KYC (Iframe)</button>
        <button onclick="checkStatus()" id="statusBtn" disabled>Check Status</button>
        <button onclick="requireKyc()" id="requireBtn" disabled>Require KYC</button>
        <button onclick="loginIfVerified()" id="loginBtn" disabled>Login if Verified</button>
        <button onclick="logout()" id="logoutBtn" disabled>Logout</button>
        <button onclick="getToken()" id="tokenBtn" disabled>Get Token</button>
    </div>

    <div class="container">
        <h3>Event Log</h3>
        <button onclick="clearLog()">Clear Log</button>
        <div id="log" class="log"></div>
    </div>

    <script type="module">
        import kyc from './dist/index.js';

        let isInitialized = false;

        function log(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function updateStatus(status) {
            const statusElement = document.getElementById('status');
            statusElement.textContent = `Status: ${status}`;
            statusElement.className = `status ${status}`;
            log(`Status changed to: ${status}`);
        }

        function setButtonsEnabled(enabled) {
            const buttons = ['popupBtn', 'iframeBtn', 'statusBtn', 'requireBtn', 'loginBtn', 'logoutBtn', 'tokenBtn'];
            buttons.forEach(id => {
                document.getElementById(id).disabled = !enabled;
            });
        }

        window.initializeKyc = function() {
            const edgeUrl = document.getElementById('edgeUrl').value;
            const clientId = document.getElementById('clientId').value;

            if (!edgeUrl || !clientId) {
                alert('Please enter both Edge URL and Client ID');
                return;
            }

            try {
                kyc.init({
                    edgeUrl,
                    clientId,
                    insecureNoSession: true, // Hackathon mode
                    onStatusChange: updateStatus,
                });

                isInitialized = true;
                setButtonsEnabled(true);
                log(`KYC client initialized with edgeUrl: ${edgeUrl}, clientId: ${clientId}`);
            } catch (error) {
                log(`Failed to initialize: ${error.message}`);
                alert('Failed to initialize KYC client');
            }
        };

        window.startKycPopup = async function() {
            if (!isInitialized) return;
            
            try {
                log('Starting KYC in popup mode...');
                const result = await kyc.startKyc({ openMode: 'popup' });
                
                if (result.ok) {
                    log(`KYC completed successfully: ${result.status}`);
                    if (result.token) {
                        log(`Token received: ${result.token.substring(0, 20)}...`);
                    }
                } else {
                    log(`KYC failed: ${result.error}`);
                }
            } catch (error) {
                log(`KYC error: ${error.message}`);
            }
        };

        window.startKycIframe = async function() {
            if (!isInitialized) return;
            
            try {
                log('Starting KYC in iframe mode...');
                const result = await kyc.startKyc({ openMode: 'iframe' });
                
                if (result.ok) {
                    log(`KYC completed successfully: ${result.status}`);
                    if (result.token) {
                        log(`Token received: ${result.token.substring(0, 20)}...`);
                    }
                } else {
                    log(`KYC failed: ${result.error}`);
                }
            } catch (error) {
                log(`KYC error: ${error.message}`);
            }
        };

        window.checkStatus = async function() {
            if (!isInitialized) return;
            
            try {
                log('Checking KYC status...');
                const status = await kyc.checkStatus();
                log(`Current status: ${status}`);
            } catch (error) {
                log(`Status check error: ${error.message}`);
            }
        };

        window.requireKyc = async function() {
            if (!isInitialized) return;
            
            try {
                log('Requiring KYC verification...');
                const isVerified = await kyc.requireKyc('modal', 'popup');
                log(`KYC requirement result: ${isVerified ? 'verified' : 'not verified'}`);
            } catch (error) {
                log(`Require KYC error: ${error.message}`);
            }
        };

        window.loginIfVerified = async function() {
            if (!isInitialized) return;
            
            try {
                log('Checking if user is logged in and verified...');
                const isLoggedIn = await kyc.loginIfVerified();
                log(`Login status: ${isLoggedIn ? 'logged in and verified' : 'not logged in or not verified'}`);
            } catch (error) {
                log(`Login check error: ${error.message}`);
            }
        };

        window.logout = function() {
            if (!isInitialized) return;
            
            kyc.logout();
            log('User logged out');
        };

        window.getToken = function() {
            if (!isInitialized) return;
            
            const token = kyc.getToken();
            if (token) {
                log(`Current token: ${token.substring(0, 20)}...`);
            } else {
                log('No token found');
            }
        };

        window.clearLog = function() {
            document.getElementById('log').innerHTML = '';
        };

        // Initial log
        log('Demo page loaded. Configure and initialize the KYC client to begin.');
    </script>
</body>
</html>

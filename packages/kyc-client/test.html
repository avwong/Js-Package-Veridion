<!DOCTYPE html>
<html>
<head>
    <title>KYC Test</title>
    <style>
        body  font-family: rial, sans-serif; padding: 2p; 
        button  padding: p 2p; margin: p; font-size: 6p; 
        .log  background: #fff; padding: p; margin: p ; height: 2p; overflow-y: auto; 
    </style>
</head>
<body>
    <h>🧪 KYC Client Test</h>
    
    <button onclick="testInit()">. Initialize</button>
    <button onclick="testPopup()">2. Test Popup</button>
    <button onclick="testIframe()">. Test Iframe</button>
    <button onclick="testStatus()">4. Check Status</button>
    
    <div class="log" id="log"></div>

    <script type="module">
        import kyc from './dist/inde.js';
        
        let initialized = false;
        
        function log(msg) 
            const logEl = document.getElementById('log');
            logEl.innerHTML += `[$new Date().toLocaleTimeString()] $msgn`;
            logEl.scrollTop = logEl.scrollHeight;
        
        
        window.testInit = () => 
            try 
                kyc.init(
                    edgeUrl: 'http://localhost:4',
                    clientId: 'test-app',
                    insecureNoSession: true,
                    onStatusChange: (status) => log(`📊 Status changed: $status`)
                );
                initialized = true;
                log('✅ KYC Client initialized successfully!');
             catch (error) 
                log(`❌ Init failed: $error.message`);
            
        ;
        
        window.testPopup = async () => 
            if (!initialized) 
                log('⚠️ Please initialize first');
                return;
            
            
            log('🚀 Starting KYC popup...');
            try 
                const result = await kyc.startKyc( openMode: 'popup' );
                if (result.ok) 
                    log(`✅ Popup success: $result.status`);
                 else 
                    log(`❌ Popup failed: $result.error`);
                
             catch (error) 
                log(`❌ Popup error: $error.message`);
            
        ;
        
        window.testIframe = async () => 
            if (!initialized) 
                log('⚠️ Please initialize first');
                return;
            
            
            log('🚀 Starting KYC iframe...');
            try 
                const result = await kyc.startKyc( openMode: 'iframe' );
                if (result.ok) 
                    log(`✅ Iframe success: $result.status`);
                 else 
                    log(`❌ Iframe failed: $result.error`);
                
             catch (error) 
                log(`❌ Iframe error: $error.message`);
            
        ;
        
        window.testStatus = async () => 
            if (!initialized) 
                log('⚠️ Please initialize first');
                return;
            
            
            log('🔍 Checking status...');
            try 
                const status = await kyc.checkStatus();
                log(`📊 Current status: $status`);
             catch (error) 
                log(`❌ Status check error: $error.message`);
            
        ;
        
        log('🎯 KYC Test ready! Click "Initialize" to start.');
    </script>
</body>
</html>
